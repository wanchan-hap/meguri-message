<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のめぐりメッセージ</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
    background: linear-gradient(180deg, #f8f3e8, #eef3e6);
    color: #5a4a35;
  }

  .screen {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
  }

  .hidden { display: none; }

  .top-card,
  .message-card {
    width: 100%;
    max-width: 430px;
    background: rgba(255,252,245,0.94);
    border-radius: 30px;
    padding: 34px 24px;
    text-align: center;
    box-shadow: 0 12px 28px rgba(120,95,55,0.12);
  }

  h1 {
    font-size: 34px;
    line-height: 1.45;
    color: #7a6542;
    margin: 4px 0 24px;
    letter-spacing: 0.04em;
  }

  .lead {
    font-size: 16px;
    line-height: 1.9;
    margin-bottom: 26px;
  }

  button {
    border-radius: 999px;
    padding: 14px 26px;
    font-size: 16px;
    cursor: pointer;
    font-family: inherit;
  }

  .main-btn {
    border: none;
    background: #c7a85d;
    color: white;
    box-shadow: 0 8px 18px rgba(150,120,60,0.22);
  }

  .message-wrap {
    width: 100%;
    max-width: 430px;
    text-align: center;
  }

  .message-card {
    padding: 30px 22px 28px;
  }

  .category {
    font-size: 16px;
    margin-bottom: 22px;
    color: #6f7f4d;
  }

  .main-message {
    font-size: 29px;
    line-height: 1.72;
    margin-bottom: 22px;
    white-space: pre-line;
  }

  .energy {
    font-size: 15px;
    margin-bottom: 18px;
  }

  .action-box {
    background: #f3eadc;
    border-radius: 20px;
    padding: 15px 16px;
    margin: 16px 0;
    font-size: 15px;
    line-height: 1.8;
  }

  .action-title {
    margin-bottom: 4px;
  }

  .ending {
    font-size: 14px;
    color: #7d8a5a;
    margin-top: 16px;
  }

  .button-area {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 18px;
    align-items: center;
  }

  .sub-btn {
    width: min(100%, 340px);
    background: rgba(255,252,245,0.8);
    color: #9b7d3f;
    border: 1px solid #d3b66e;
  }

  .text-btn {
    background: transparent;
    border: none;
    color: #8d7d60;
    font-size: 14px;
    padding: 6px 12px;
  }

  .footer {
    font-size: 12px;
    margin-top: 18px;
    color: #9b8a6a;
  }

  @media (max-height: 720px) {
    .screen { align-items: flex-start; padding-top: 18px; }
    .message-card { padding: 24px 20px; }
    .main-message { font-size: 25px; line-height: 1.65; }
    .category { margin-bottom: 16px; }
    .action-box { margin: 12px 0; }
  }
</style>
</head>
<body>

<section id="topScreen" class="screen">
  <div class="top-card">
    <h1>🌱 今日のめぐり<br>メッセージ</h1>
    <p class="lead">
      あなたの足元に、<br>
      今日必要なめぐりの言葉を届けます。
    </p>
    <button class="main-btn" onclick="showMessage()">メッセージを受け取る</button>
  </div>
</section>

<section id="messageScreen" class="screen hidden">
  <div class="message-wrap">
    <div id="messageCard" class="message-card">
      <div class="category" id="theme"></div>
      <div class="main-message" id="message"></div>
      <div class="energy" id="energy"></div>
      <div class="action-box">
        <div class="action-title">🌿 今日の整えアクション</div>
        <div id="action"></div>
      </div>
      <div class="ending" id="ending"></div>
    </div>

    <div class="button-area">
      <button class="sub-btn" onclick="downloadImage()">このメッセージを画像保存</button>
      <button class="text-btn" onclick="backToTop()">← トップへ戻る</button>
    </div>

    <div class="footer">めぐりを思い出す、小さな場所</div>
  </div>
</section>

<script>
const themes = [
  "🌱 土のことば",
  "🌾 豊かさのことば",
  "🪷 整えることば",
  "🍃 巡りのことば",
  "🐉 守護ドラゴンメッセージ",
  "☀️🌙 月と太陽のことば"
];

const messages = [
  "安心は、\n小さな整えから\n始まる。",
  "焦る時ほど、\n先に足元を整える。",
  "止まっているように見える時も、\n巡りは静かに動いている。",
  "芽が出ない時は、\n根を伸ばしている途中かもしれません。",
  "受け取ることも、\n巡りを起こす大切な力です。",
  "今日は、\n動くより“満たす”を優先してみて。"
];

const energies = [
  "🌙 内側を満たす流れの日",
  "☀️ 軽やかに動く流れの日",
  "🍃 風通しを良くする日",
  "🌱 根を育てる日",
  "🌾 小さな豊かさを受け取る日"
];

const actions = [
  "空を見上げて深呼吸する",
  "温かい飲み物をゆっくり飲む",
  "机の上をひとつ整える",
  "窓を開けて風を入れる",
  "今日は無理に答えを出さず、流れを待つ"
];

const endings = [
  "今日も巡りは続いている🌱",
  "あなたのペースで大丈夫。",
  "小さな整えが未来を育てる。",
  "安心は、足元から育っていく。"
];

function randomItem(array) {
  return array[Math.floor(Math.random() * array.length)];
}

function showMessage() {
  document.getElementById("theme").innerText = randomItem(themes);
  document.getElementById("message").innerText = randomItem(messages);
  document.getElementById("energy").innerText = randomItem(energies);
  document.getElementById("action").innerText = randomItem(actions);
  document.getElementById("ending").innerText = randomItem(endings);

  document.getElementById("topScreen").classList.add("hidden");
  document.getElementById("messageScreen").classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function backToTop() {
  document.getElementById("messageScreen").classList.add("hidden");
  document.getElementById("topScreen").classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function downloadImage() {
  const card = document.getElementById("messageCard");

  html2canvas(card, {
    backgroundColor: "#fffaf0",
    scale: 2,
    useCORS: true
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "meguri-message.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
