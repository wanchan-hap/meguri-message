<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のめぐりメッセージ</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
  background: linear-gradient(180deg, #f8f3e8, #eef3e6);
  color: #5a4a35;
  display: flex;
  justify-content: center;
  padding: 22px;
  box-sizing: border-box;
}

.app {
  width: 100%;
  max-width: 430px;
  text-align: center;
}

.top-card,
.message-card {
  background: rgba(255,252,245,0.94);
  border-radius: 30px;
  padding: 34px 22px;
  box-shadow: 0 12px 28px rgba(120,95,55,0.12);
  box-sizing: border-box;
}

h1 {
  font-size: 34px;
  line-height: 1.45;
  color: #7a6542;
  margin: 10px 0 24px;
  letter-spacing: 0.04em;
}

.lead {
  font-size: 16px;
  line-height: 1.9;
  margin-bottom: 26px;
}

button {
  border: none;
  border-radius: 999px;
  padding: 14px 26px;
  font-size: 16px;
  cursor: pointer;
  font-family: inherit;
}

.main-btn {
  background: #c7a85d;
  color: white;
}

.sub-btn {
  margin-top: 18px;
  background: transparent;
  color: #9b7d3f;
  border: 1px solid #d3b66e;
}

.message-card {
  display: none;
  margin-top: 22px;
}

.category {
  font-size: 16px;
  margin-bottom: 26px;
  color: #6f7f4d;
}

.main-message {
  font-size: 30px;
  line-height: 1.75;
  margin-bottom: 26px;
  white-space: pre-line;
}

.energy {
  font-size: 15px;
  margin-bottom: 20px;
}

.action-box {
  background: #f3eadc;
  border-radius: 20px;
  padding: 16px;
  margin: 18px 0;
  font-size: 15px;
  line-height: 1.8;
}

.ending {
  font-size: 14px;
  color: #7d8a5a;
  margin-top: 18px;
}

.share-area {
  display: none;
  margin-bottom: 28px;
}

.footer {
  font-size: 12px;
  margin-top: 22px;
  color: #9b8a6a;
}
</style>
</head>

<body>

<div class="app">

  <div class="top-card">

    <h1>🌱 今日のめぐり<br>メッセージ</h1>

    <p class="lead">
      あなたの足元に、<br>
      今日必要なめぐりの言葉を届けます。
    </p>

    <button class="main-btn" onclick="showMessage()">
      メッセージを受け取る
    </button>

  </div>

  <div id="messageCard" class="message-card">

    <div class="category" id="theme"></div>

    <div class="main-message" id="message"></div>

    <div class="energy" id="energy"></div>

    <div class="action-box">
      <div>🌿 今日の整えアクション</div>
      <div id="action"></div>
    </div>

    <div class="ending" id="ending"></div>

  </div>

  <div class="share-area" id="shareArea">
    <button class="sub-btn" onclick="downloadImage()">
      このメッセージを画像保存
    </button>
  </div>

  <div class="footer">
    めぐりを思い出す、小さな場所
  </div>

</div>

<script>
const themes = [
  "🌱 土のことば",
  "🌾 豊かさのことば",
  "🪷 整えることば",
  "🍃 巡りのことば",
  "🐉 守護ドラゴンメッセージ",
  "☀️🌙 月と太陽のことば"
];

const messages = [
  "安心は、\n小さな整えから\n始まる。",
  "焦る時ほど、\n先に足元を整える。",
  "止まっているように見える時も、\n巡りは静かに動いている。",
  "芽が出ない時は、\n根を伸ばしている途中かもしれません。",
  "受け取ることも、\n巡りを起こす大切な力です。",
  "今日は、\n動くより“満たす”を優先してみて。"
];

const energies = [
  "🌙 内側を満たす流れの日",
  "☀️ 軽やかに動く流れの日",
  "🍃 風通しを良くする日",
  "🌱 根を育てる日",
  "🌾 小さな豊かさを受け取る日"
];

const actions = [
  "空を見上げて深呼吸する",
  "温かい飲み物をゆっくり飲む",
  "机の上をひとつ整える",
  "窓を開けて風を入れる",
  "今日は無理に答えを出さず、流れを待つ"
];

const endings = [
  "今日も巡りは続いている🌱",
  "あなたのペースで大丈夫。",
  "小さな整えが未来を育てる。",
  "安心は、足元から育っていく。"
];

function randomItem(array) {
  return array[Math.floor(Math.random() * array.length)];
}

function showMessage() {
  const messageCard = document.getElementById("messageCard");
  const shareArea = document.getElementById("shareArea");

  messageCard.style.display = "block";
  shareArea.style.display = "block";

  document.getElementById("theme").innerText = randomItem(themes);
  document.getElementById("message").innerText = randomItem(messages);
  document.getElementById("energy").innerText = randomItem(energies);
  document.getElementById("action").innerText = randomItem(actions);
  document.getElementById("ending").innerText = randomItem(endings);

  messageCard.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

function downloadImage() {
  const card = document.getElementById("messageCard");

  if (typeof html2canvas === "undefined") {
    alert("画像保存の準備中です。少し待ってからもう一度お試しください。");
    return;
  }

  html2canvas(card, {
    backgroundColor: "#fffaf0",
    scale: 2
  }).then(function(canvas) {
    const link = document.createElement("a");
    link.download = "meguri-message.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
